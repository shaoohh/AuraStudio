<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Studio - Settings Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f8faf9] text-[#1f1d1a]">
  <main class="grid min-h-screen grid-cols-[280px_minmax(0,1fr)]">
    <aside class="border-r border-[#e5e4e7] bg-white px-6 py-8">
      <div class="text-xs font-semibold uppercase tracking-[0.16em] text-[#9d9385]">Settings</div>
      <h1 class="mt-3 text-2xl font-semibold">个人设置</h1>

      <div class="mt-8 space-y-3">
        <div class="rounded-2xl bg-[#243137] px-4 py-3 text-sm text-white">个人资料</div>
        <div class="rounded-2xl border border-[#e5e4e7] bg-[#fcfcfa] px-4 py-3 text-sm text-[#5f564a]">账户安全</div>
        <div class="rounded-2xl border border-[#e5e4e7] bg-[#fcfcfa] px-4 py-3 text-sm text-[#5f564a]">外观偏好</div>
      </div>
    </aside>

    <section class="px-10 py-8">
      <div class="flex items-end justify-between gap-6">
        <div>
          <div class="text-sm font-medium tracking-[0.14em] text-[#9c9486]">PROFILE</div>
          <h2 class="mt-3 text-4xl font-semibold">作者信息与偏好</h2>
          <p class="mt-4 max-w-2xl text-sm leading-7 text-gray-500">这个静态页先拆出去，后面你单独盯头像悬停、输入框焦点和按钮反馈时会更顺手。</p>
        </div>
        <a href="./test.html" class="rounded-full border border-[#e5e4e7] bg-white px-4 py-2 text-sm text-[#5f564a]">返回入口</a>
      </div>

      <div class="mt-10 rounded-[28px] border border-[#e5e4e7] bg-white p-8 shadow-sm">
        <div class="flex items-start gap-8">
          <div class="group relative h-28 w-28 overflow-hidden rounded-[28px] border border-[#e7e2d8] bg-[#f3f4f2]">
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Aura" alt="Aura" class="h-full w-full object-cover">
            <div class="absolute inset-0 flex items-center justify-center bg-black/45 text-sm text-white opacity-0 transition-opacity duration-300 group-hover:opacity-100">
              更换头像
            </div>
          </div>

          <div class="grid flex-1 gap-5 md:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm font-medium">笔名</span>
              <input class="h-12 w-full rounded-2xl border border-[#e5e4e7] bg-[#f8faf9] px-4 text-sm outline-none focus:border-[#BD9F67] focus:bg-white focus:ring-1 focus:ring-[#BD9F67]" value="Aura Writer">
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-medium">邮箱</span>
              <input class="h-12 w-full cursor-not-allowed rounded-2xl border border-[#e5e4e7] bg-[#f3f4f2] px-4 text-sm text-gray-400 outline-none" value="hello@aura-studio.com" readonly>
            </label>

            <label class="block md:col-span-2">
              <span class="mb-2 block text-sm font-medium">简介</span>
              <textarea class="min-h-[180px] w-full rounded-2xl border border-[#e5e4e7] bg-[#f8faf9] px-4 py-3 text-sm leading-7 outline-none focus:border-[#BD9F67] focus:bg-white focus:ring-1 focus:ring-[#BD9F67]">长期写长篇，也会整理任务，偶尔会把一段灵感先扔进 AI Prompt 再慢慢磨。</textarea>
            </label>
          </div>
        </div>

        <div class="mt-8 flex justify-end gap-3">
          <button class="rounded-2xl px-5 py-3 text-sm text-gray-500 hover:bg-[#f3f4f2]">取消</button>
          <button class="rounded-2xl bg-[#243137] px-5 py-3 text-sm font-medium text-white shadow-lg shadow-[#243137]/10">保存更改</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
